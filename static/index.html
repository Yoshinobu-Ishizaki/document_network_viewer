<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document Network Viewer</title>
  <link rel="stylesheet" href="/style.css" />
  <!-- vis.js Network (CDN) -->
  <script src="/vis-network.min.js"></script>
</head>
<body>
  <header>
    <div id="breadcrumb">
      <span class="crumb active" data-level="root">All</span>
    </div>
    <button id="expand-all-btn" title="Expand all subcategories">⊞</button>
    <button id="collapse-all-btn" title="Collapse all">⊟</button>
    <div id="search-bar">
      <input id="search-input" type="search" placeholder="Search documents…" autocomplete="off" />
      <button id="search-btn" title="Search">&#128269;</button>
    </div>
    <h1>Document Network Viewer</h1>
    <button id="theme-btn" title="Toggle color mode">☀ Light</button>
    <button id="settings-btn" title="Color settings">⚙ Colors</button>
    <button id="quit-btn" title="Stop server and quit">Quit</button>
  </header>

  <!-- Search results panel -->
  <div id="search-results" class="hidden">
    <div id="search-results-header">
      <span id="search-results-label"></span>
      <button id="search-results-close" title="Close">&times;</button>
    </div>
    <ul id="search-results-list"></ul>
    <div id="search-resize-handle" title="Drag to resize"></div>
  </div>

  <!-- Context menu for L2 nodes and L3 doc nodes -->
  <div id="context-menu" class="hidden">
    <button id="ctx-rename" class="ctx-l2-only">Rename subcategory</button>
    <button id="ctx-merge" class="ctx-l2-only">Merge into…</button>
    <button id="ctx-move-doc" class="ctx-l3-only">Move to…</button>
  </div>

  <!-- Merge dialog -->
  <div id="merge-overlay" class="hidden">
    <div id="merge-dialog">
      <h3>Merge "<span id="merge-source-label"></span>" into…</h3>
      <select id="merge-target-select"></select>
      <div id="merge-actions">
        <button id="merge-confirm">Merge</button>
        <button id="merge-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Move-doc dialog -->
  <div id="move-doc-overlay" class="hidden">
    <div id="move-doc-dialog">
      <h3>Move "<span id="move-doc-label"></span>"</h3>
      <div class="move-doc-row">
        <label>Category</label>
        <select id="move-doc-l1-select"></select>
      </div>
      <div class="move-doc-row">
        <label>Subcategory</label>
        <select id="move-doc-l2-select"></select>
      </div>
      <div class="move-doc-new-row">
        <label>New subcategory</label>
        <input id="move-doc-new-l2" type="text" placeholder="Type name to create new…" />
      </div>
      <div id="move-doc-actions">
        <button id="move-doc-confirm">Move</button>
        <button id="move-doc-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Settings panel -->
  <div id="settings-panel" class="hidden">
    <div id="settings-panel-header">
      <span>Color Settings</span>
      <button id="settings-close">&times;</button>
    </div>
    <div id="settings-body">
      <label>L1 nodes <input type="color" data-key="l1Bg" /></label>
      <label>L2 nodes <input type="color" data-key="l2Bg" /></label>
      <label>Doc nodes <input type="color" data-key="docBg" /></label>
      <label>Doc border <input type="color" data-key="docBorder" /></label>
      <label>Semantic edges <input type="color" data-key="semanticEdge" /></label>
      <label>Hierarchy edges <input type="color" data-key="containEdge" /></label>
      <label>Selection color <input type="color" data-key="selectionColor" /></label>
      <label>Search L1 highlight <input type="color" data-key="searchL1Color" /></label>
      <label>Search L2 highlight <input type="color" data-key="searchL2Color" /></label>
      <div id="settings-actions">
        <button id="settings-apply">Apply</button>
        <button id="settings-save">Save</button>
        <button id="settings-reset">Reset</button>
      </div>
    </div>
  </div>

  <main>
    <div id="graph-container">
      <div id="graph"></div>
    </div>

    <div id="resize-handle" class="hidden" title="Drag to resize"></div>

    <div id="doc-panel" class="hidden">
      <div id="doc-panel-header">
        <span id="doc-title"></span>
        <button id="doc-close" title="Close">&times;</button>
      </div>
      <div id="doc-content"></div>
    </div>
  </main>

  <script src="/main.js"></script>
</body>
</html>
